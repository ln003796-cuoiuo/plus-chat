# plus-chat-main/pubspec.yaml
name: plus_chat
description: Плюс Чат - современный мессенджер
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.2
  path_provider: ^2.1.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  audioplayers: ^5.2.1
  badges: ^3.1.2
  permission_handler: ^11.1.0
  open_file: ^3.3.2
  # --- root_checker УДАЛЁН ---
  # root_checker: 2.0.0
  # --- /root_checker УДАЛЁН ---
  # --- ЗАВИСИМОСТЬ ДЛЯ SHA-1 ---
  crypto: ^3.0.3
  # --- /ЗАВИСИМОСТЬ ---

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

